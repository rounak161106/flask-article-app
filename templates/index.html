<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Articles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='/css/style.css') }}">
        <script src="{{ url_for('static', filename = "js/script.js") }}"></script>
    </head>
    <style>
        ol li::marker {
            font-weight: bold;
            font-size: 22px;
            color: #0d6efd; /* bootstrap blue */
        }
        .header{
            display: flex;
            justify-content: space-between;
        }
     </style>
    <body>
        <div class="container">
            <div class="header">
                <div class="Jombotron" >
                    <h1 class="header-4" style="text-decoration: underline;"> All Articles   </h1><br>
                </div>
                <div class="col-md-4" style="margin-top: 8px; margin-right: 10px;">
                    <a href="/logout" class="btn btn-secondary">Logout</a>
                    <a href="/create" class="btn btn-primary">Add Articles</a>
                    <a href="/create_author" class="btn btn-primary">Add Author</a>
                </div>
            </div>
            <div class="row">
                <div class="col-md-10">
                <ol class="ps-3">
                    {% for i in articles %}
                        <li class="mb-4">
                            <h4 class="fw-bold">{{ i.title }}</h4>

                            <p class="mb-1">
                                <strong>Written by:</strong>
                                {% for author in i.authors %}
                                    <a href="/article_by/{{ author.name }}">{{ author.name }}</a>{% if not loop.last %}, {% endif %}
                                {% endfor %} on {{ time }}
                            </p>

                            <p>
                                <strong>Content:</strong> {{ i.content }}
                            </p>
                                <hr>
                        </li>
                    {% endfor %}
                </ol>
            </div>
            
            
        </div>
        </div>
        <script>like()</script>
    </body>
</html>
